<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Intelligence Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --accent: #8b5cf6; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #f8fafc; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .tab-active { border-bottom: 3px solid var(--accent); color: white; }
        pre { background: #000; padding: 1rem; border-radius: 12px; font-size: 0.8rem; max-height: 400px; overflow: auto; }
        .modal { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        select { background: #1e293b; border: 1px solid #334155; padding: 0.5rem; border-radius: 8px; color: white; }
        input { background: #1e293b; border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 20px; color: white; width: 300px; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">YT Intelligence Pro</h1>
                <p class="text-slate-400">Centralized Data & Metadata Monitoring</p>
            </div>
            <div id="stats" class="flex gap-6 mt-6 md:mt-0">
                <!-- Stats injected here -->
            </div>
        </header>

        <!-- Controls Area -->
        <div class="glass p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex gap-8">
                <button onclick="changeType('comments')" id="tab-comments" class="pb-2 font-semibold text-slate-400 tab-active">Comments</button>
                <button onclick="changeType('videos')" id="tab-videos" class="pb-2 font-semibold text-slate-400">Video Metadata</button>
            </div>
            <div class="flex gap-4 items-center">
                <input type="text" id="search" placeholder="Search data..." oninput="handleSearch()">
                <select id="per_page" onchange="handlePerPage()">
                    <option value="20">20 per page</option>
                    <option value="50">50 per page</option>
                    <option value="100">100 per page</option>
                    <option value="500">500 per page</option>
                </select>
                <button onclick="deleteAllData()" class="px-4 py-2 bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/50 rounded-lg transition font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    Hapus Semua Data
                </button>
            </div>
        </div>

        <!-- Table Content -->
        <div class="glass overflow-hidden">
            <div class="overflow-x-auto" style="max-height: 700px;">
                <table class="w-full text-left">
                    <thead class="bg-[#1e293b] sticky top-0">
                        <tr id="table-head">
                            <!-- Headers injected here -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Footer -->
            <div class="p-6 border-t border-slate-700 flex justify-between items-center">
                <div class="text-slate-400 text-sm">
                    Showing <span id="page-info" class="text-white font-bold">1-20</span> of <span id="total-info" class="text-white font-bold">0</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="prevPage()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition">Prev</button>
                    <button onclick="nextPage()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JSON Modal -->
    <div id="json-modal" class="modal fixed inset-0 hidden z-50 flex items-center justify-center p-10">
        <div class="glass max-w-4xl w-full p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl">&times;</button>
            <h2 class="text-2xl font-bold mb-4">JSON Preview</h2>
            <pre id="json-content"></pre>
            <div class="mt-6 flex justify-end">
                <button onclick="copyJson()" class="px-6 py-2 bg-violet-600 rounded-lg hover:bg-violet-500 transition">Copy JSON</button>
            </div>
        </div>
    </div>

    <script>
        let currentType = 'comments';
        let currentPage = 1;
        let perPage = 20;
        let searchQuery = '';

        async function updateStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stats').innerHTML = `
                <div class="text-center"><p class="text-xs text-slate-500 uppercase">Videos</p><p class="text-xl font-bold">${data.total_videos}</p></div>
                <div class="text-center"><p class="text-xs text-slate-500 uppercase">Comments</p><p class="text-xl font-bold">${data.total_comments.toLocaleString()}</p></div>
                <div class="text-center"><p class="text-xs text-slate-500 uppercase">Total Likes</p><p class="text-xl font-bold">${data.total_likes.toLocaleString()}</p></div>
            `;
        }

        async function fetchData() {
            const res = await fetch(`/api/data?type=${currentType}&page=${currentPage}&per_page=${perPage}&q=${searchQuery}`);
            const data = await res.json();
            
            renderTable(data.items);
            updatePagination(data);
        }

        function renderTable(items) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            if (currentType === 'comments') {
                head.innerHTML = `
                    <th class="p-4 border-b border-slate-700">Author</th>
                    <th class="p-4 border-b border-slate-700">Comment (Display)</th>
                    <th class="p-4 border-b border-slate-700">Raw Comment</th>
                    <th class="p-4 border-b border-slate-700">Likes</th>
                    <th class="p-4 border-b border-slate-700">Actions</th>
                `;
                items.forEach(item => {
                    const snippet = item.snippet.topLevelComment.snippet;
                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-800/50 hover:bg-white/5';
                    row.innerHTML = `
                        <td class="p-4 text-violet-300 font-medium">${snippet.authorDisplayName}</td>
                        <td class="p-4 text-slate-400 truncate max-w-xs">${snippet.textDisplay}</td>
                        <td class="p-4 text-slate-500 italic truncate max-w-xs">${snippet.textOriginal || 'N/A'}</td>
                        <td class="p-4"><span class="bg-violet-500/10 text-violet-400 px-3 py-1 rounded-full text-xs">${snippet.likeCount}</span></td>
                        <td class="p-4"><button onclick='viewJson(${JSON.stringify(item)})' class="text-cyan-400 hover:underline text-sm">JSON</button></td>
                    `;
                    body.appendChild(row);
                });
            } else {
                head.innerHTML = `
                    <th class="p-4 border-b border-slate-700">Title</th>
                    <th class="p-4 border-b border-slate-700">Views</th>
                    <th class="p-4 border-b border-slate-700">Likes</th>
                    <th class="p-4 border-b border-slate-700">Duration</th>
                    <th class="p-4 border-b border-slate-700">Actions</th>
                `;
                items.forEach(item => {
                    const snippet = item.snippet;
                    const stats = item.statistics;
                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-800/50 hover:bg-white/5';
                    row.innerHTML = `
                        <td class="p-4 text-cyan-300 font-medium">${snippet.title}</td>
                        <td class="p-4 text-slate-400">${parseInt(stats.viewCount).toLocaleString()}</td>
                        <td class="p-4 text-slate-400">${parseInt(stats.likeCount).toLocaleString()}</td>
                        <td class="p-4 text-slate-500">${item.contentDetails.duration}</td>
                        <td class="p-4"><button onclick='viewJson(${JSON.stringify(item)})' class="text-cyan-400 hover:underline text-sm">JSON</button></td>
                    `;
                    body.appendChild(row);
                });
            }
        }

        function updatePagination(data) {
            document.getElementById('total-info').innerText = data.total.toLocaleString();
            const start = (data.page - 1) * data.per_page + 1;
            const end = Math.min(data.page * data.per_page, data.total);
            document.getElementById('page-info').innerText = `${start}-${end}`;
        }

        function changeType(type) {
            currentType = type;
            currentPage = 1;
            document.getElementById('tab-comments').classList.toggle('tab-active', type === 'comments');
            document.getElementById('tab-videos').classList.toggle('tab-active', type === 'videos');
            fetchData();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search').value;
            currentPage = 1;
            fetchData();
        }

        function handlePerPage() {
            perPage = document.getElementById('per_page').value;
            currentPage = 1;
            fetchData();
        }

        function nextPage() { currentPage++; fetchData(); }
        function prevPage() { if(currentPage > 1) { currentPage--; fetchData(); } }

        function viewJson(item) {
            document.getElementById('json-content').innerText = JSON.stringify(item, null, 2);
            document.getElementById('json-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('json-modal').classList.add('hidden');
        }

        function copyJson() {
            const content = document.getElementById('json-content').innerText;
            navigator.clipboard.writeText(content);
            alert("JSON copied to clipboard!");
        }

        async function deleteAllData() {
            if (!confirm("Apakah Anda yakin ingin menghapus semua data? Tindakan ini tidak dapat dibatalkan.")) {
                return;
            }

            try {
                const res = await fetch('/api/delete_all', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await res.json();
                
                if (data.success) {
                    alert(data.message);
                    updateStats();
                    fetchData();
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Gagal menghapus data: " + err);
            }
        }

        // Init
        updateStats();
        fetchData();
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
